name: 🚀 Deploy to Railway

on:
  push:
    branches:
      - main        # main branch-এ push হলে auto deploy
  pull_request:
    branches:
      - main        # PR এলে শুধু build check (deploy না)

jobs:
  # ─────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────
  build:
    name: 🔨 Build & Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 Run Lint
        run: npm run lint --if-present
        continue-on-error: true  # Lint error হলেও build চলবে

      - name: 🏗️ Build Next.js app
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          NEXT_PUBLIC_STORE_NAME: ${{ secrets.NEXT_PUBLIC_STORE_NAME }}
          NEXT_PUBLIC_IMGBB_API_KEY: ${{ secrets.NEXT_PUBLIC_IMGBB_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: npm run build

      - name: ✅ Build successful
        run: echo "Build completed successfully!"

  # ─────────────────────────────────────
  # JOB 2: Deploy to Railway
  # (শুধু main branch-এ push হলে চলবে)
  # ─────────────────────────────────────
  deploy:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    needs: build   # build job সফল হলে তারপর deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service="Emon-Janopriyo-Shop"

      - name: ✅ Deployment complete
        run: echo "🎉 Successfully deployed to Railway!"
